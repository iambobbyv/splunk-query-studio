<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Splunk Query Studio</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 700px;
  height: 440px;
  background: #020617;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  -webkit-app-region: drag;
  user-select: none;
  opacity: 1;
  transition: opacity 0.9s ease-out;
}
body.fade-out { opacity: 0; }

/* ── Canvas sits below everything ────────────────────────── */
#starfield {
  position: absolute;
  top: 0; left: 0;
  z-index: 0;
}

/* ── Nebula glow overlays ─────────────────────────────────── */
.nebula {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  z-index: 1;
}
.nebula-1 {
  width: 380px; height: 280px;
  top: -60px; left: -80px;
  background: radial-gradient(ellipse, rgba(30,58,138,0.55) 0%, transparent 70%);
}
.nebula-2 {
  width: 300px; height: 280px;
  bottom: -60px; right: -20px;
  background: radial-gradient(ellipse, rgba(109,40,217,0.3) 0%, transparent 70%);
}
.nebula-3 {
  width: 220px; height: 220px;
  top: 20px; right: 60px;
  background: radial-gradient(ellipse, rgba(6,182,212,0.18) 0%, transparent 70%);
}

/* ── Floating SPL command strings ─────────────────────────── */
.spl-layer {
  position: absolute;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  overflow: hidden;
}
.spl-cmd {
  position: absolute;
  font-family: 'Consolas', 'Cascadia Code', 'Courier New', monospace;
  white-space: nowrap;
  opacity: 0;
  animation: spl-drift linear infinite;
}
@keyframes spl-drift {
  0%   { opacity: 0; transform: translateX(-240px); }
  8%   { opacity: 1; }
  88%  { opacity: 1; }
  100% { opacity: 0; transform: translateX(940px); }
}

/* ── Centre logo ──────────────────────────────────────────── */
.logo-area {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 3;
  pointer-events: none;
}

/* orbit canvas sits here */
#orbitCanvas {
  display: block;
  margin-bottom: 22px;
}

.app-name {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.35em;
  color: #e2e8f0;
  text-transform: uppercase;
  margin-bottom: 7px;
  text-shadow: 0 0 20px rgba(59,130,246,0.4);
}
.app-tagline {
  font-size: 11px;
  color: rgba(148,163,184,0.65);
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

/* ── Progress bar ─────────────────────────────────────────── */
.progress-wrap {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: rgba(255,255,255,0.04);
  z-index: 5;
}
.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #1e3a8a 0%, #3b82f6 60%, #7dd3fc 100%);
  box-shadow: 0 0 10px rgba(59,130,246,0.9), 0 0 20px rgba(59,130,246,0.4);
  transition: width 0.12s linear;
}

/* ── Version badge ────────────────────────────────────────── */
.version {
  position: absolute;
  bottom: 14px;
  right: 18px;
  font-size: 10px;
  color: rgba(100,116,139,0.55);
  letter-spacing: 0.08em;
  z-index: 5;
}

/* ── Loading dots ─────────────────────────────────────────── */
.loading-dots {
  position: absolute;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  z-index: 5;
}
.dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(59,130,246,0.6);
  animation: dot-pulse 1.4s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-pulse {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50%       { opacity: 1;   transform: scale(1.3); }
}
</style>
</head>
<body>

<!-- Star field canvas -->
<canvas id="starfield" width="700" height="440"></canvas>

<!-- Nebula overlays -->
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>

<!-- Floating SPL commands -->
<div class="spl-layer" id="splLayer"></div>

<!-- Logo -->
<div class="logo-area">
  <canvas id="orbitCanvas" width="220" height="220"></canvas>
  <div class="app-name">Splunk Query Studio</div>
  <div class="app-tagline">Build smarter queries, faster</div>
</div>

<!-- Progress -->
<div class="progress-wrap">
  <div class="progress-bar" id="progressBar"></div>
</div>

<!-- Loading indicator -->
<div class="loading-dots">
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<!-- Version -->
<div class="version">v1.0.0</div>

<script>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   STARFIELD
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const sfCanvas = document.getElementById('starfield');
const sfCtx    = sfCanvas.getContext('2d');
const W = 700, H = 440;

const stars = Array.from({ length: 240 }, () => ({
  x:     Math.random() * W,
  y:     Math.random() * H,
  r:     Math.random() * 1.4 + 0.2,
  base:  Math.random() * 0.7 + 0.15,
  speed: Math.random() * 0.025 + 0.006,
  phase: Math.random() * Math.PI * 2,
}));

// A handful of larger "bright" stars
const brightStars = Array.from({ length: 12 }, () => ({
  x:     Math.random() * W,
  y:     Math.random() * H,
  r:     Math.random() * 2.2 + 1.2,
  base:  Math.random() * 0.5 + 0.4,
  speed: Math.random() * 0.015 + 0.004,
  phase: Math.random() * Math.PI * 2,
}));

function drawStarfield(t) {
  sfCtx.clearRect(0, 0, W, H);
  for (const s of stars) {
    const a = s.base * (0.5 + 0.5 * Math.sin(s.phase + t * s.speed));
    sfCtx.beginPath();
    sfCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sfCtx.fillStyle = `rgba(255,255,255,${a.toFixed(3)})`;
    sfCtx.fill();
  }
  for (const s of brightStars) {
    const a = s.base * (0.5 + 0.5 * Math.sin(s.phase + t * s.speed));
    // Cross / sparkle for bright stars
    sfCtx.beginPath();
    sfCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sfCtx.fillStyle = `rgba(200,220,255,${a.toFixed(3)})`;
    sfCtx.fill();
    // Tiny cross arms
    sfCtx.strokeStyle = `rgba(200,220,255,${(a * 0.5).toFixed(3)})`;
    sfCtx.lineWidth = 0.5;
    sfCtx.beginPath();
    sfCtx.moveTo(s.x - s.r * 2.5, s.y);
    sfCtx.lineTo(s.x + s.r * 2.5, s.y);
    sfCtx.moveTo(s.x, s.y - s.r * 2.5);
    sfCtx.lineTo(s.x, s.y + s.r * 2.5);
    sfCtx.stroke();
  }
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SPL FLOATING COMMANDS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const SPL_CMDS = [
  'index=netops sourcetype=cisco:ios earliest=-1h',
  '| stats count, sum(bytes) as total_bytes by src_ip, dest_ip, protocol',
  '| where action="denied" | sort -count',
  '| eval mb=round(bytes/1048576, 2) | stats sum(mb) as total_mb by src_ip',
  'index=wineventlog sourcetype=WinEventLog:Security earliest=-4h',
  '| stats count by user, src_ip, action | where action="failure"',
  '| stats avg(cpu_load) as avg_cpu, avg(mem_used) as avg_mem by NodeName',
  'index=pan_logs sourcetype=pan:log | stats count by app, action, dest_ip',
  '| eval threat_level=if(count>100,"high",if(count>50,"medium","low"))',
  '| timechart span=5m count by action',
  '| lookup geoip src_ip OUTPUT country, city, lat, lon',
  'index=crowdstrike sourcetype=crowdstrike:fdr earliest=-24h',
  '| stats dc(user) as unique_users, dc(hostname) as hosts by event_type',
  '| where status >= 400 | stats count by status, uri_path | sort -count',
  'index=okta sourcetype=OktaIM2:log | stats count by user, outcome',
  '| stats latest(Status) as Status, latest(NodeName) as NodeName by NodeDNS',
  '| rex field=_raw "src_ip=(?<src_ip>[\\d.]+)"',
  '| bucket _time span=1h | stats count by _time, action',
  'index=storage sourcetype=netapp:ontap:ems | stats count by severity, event',
  '| table src_ip, dest_ip, bytes, protocol | sort -bytes',
];

const layer = document.getElementById('splLayer');
SPL_CMDS.forEach((cmd, i) => {
  const el = document.createElement('div');
  el.className = 'spl-cmd';
  el.textContent = cmd;

  // Random vertical placement (avoid the very center)
  let topPct;
  do { topPct = Math.random() * 82 + 5; }
  while (topPct > 35 && topPct < 65); // leave gap for logo

  el.style.top    = topPct + '%';
  el.style.fontSize = (9 + Math.random() * 3.5).toFixed(1) + 'px';

  const isCyan = i % 3 === 1;
  const opacity = (0.18 + Math.random() * 0.22).toFixed(2);
  el.style.color  = isCyan
    ? `rgba(125,211,252,${opacity})`
    : `rgba(59,130,246,${opacity})`;

  const dur   = (20 + Math.random() * 18).toFixed(1) + 's';
  const delay = -(Math.random() * 38).toFixed(1) + 's';
  el.style.animationDuration = dur;
  el.style.animationDelay   = delay;

  layer.appendChild(el);
});

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ORBITAL SQS ANIMATION  (canvas)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const oc  = document.getElementById('orbitCanvas');
const oct = oc.getContext('2d');
const OW  = 220, OH = 220;
const CX  = OW / 2, CY = OH / 2;

const ORBIT_R   = 74;   // orbit radius
const LETTER_FS = 54;   // font-size px
const ORBIT_SPD = 0.44; // rad/s

// Three letters with their phase offsets (120° apart)
const letters = [
  { char: 'S', phase: 0,                   r: 255, g: 255, b: 255 },
  { char: 'Q', phase: (2 * Math.PI) / 3,  r: 125, g: 211, b: 252 },
  { char: 'S', phase: (4 * Math.PI) / 3,  r: 255, g: 255, b: 255 },
];

function drawOrbitCanvas(t) {
  oct.clearRect(0, 0, OW, OH);

  // Orbit ring 1
  oct.beginPath();
  oct.arc(CX, CY, ORBIT_R, 0, Math.PI * 2);
  oct.strokeStyle = 'rgba(59,130,246,0.18)';
  oct.lineWidth = 1;
  oct.stroke();

  // Orbit ring 2 (inner, smaller)
  oct.beginPath();
  oct.arc(CX, CY, ORBIT_R * 0.55, 0, Math.PI * 2);
  oct.strokeStyle = 'rgba(59,130,246,0.09)';
  oct.lineWidth   = 0.7;
  oct.stroke();

  // Centre pulse
  const pulse = 0.5 + 0.5 * Math.sin(t * 2.8);
  const cGrd  = oct.createRadialGradient(CX, CY, 0, CX, CY, 8 + pulse * 6);
  cGrd.addColorStop(0, `rgba(59,130,246,${0.9 + pulse * 0.1})`);
  cGrd.addColorStop(1, 'rgba(59,130,246,0)');
  oct.fillStyle = cGrd;
  oct.beginPath();
  oct.arc(CX, CY, 8 + pulse * 6, 0, Math.PI * 2);
  oct.fill();

  // Orbiting dot trails for each letter
  letters.forEach((ltr, i) => {
    const angle = ltr.phase + t * ORBIT_SPD;
    const lx = CX + Math.cos(angle) * ORBIT_R;
    const ly = CY + Math.sin(angle) * ORBIT_R;

    // Glow behind letter
    const glowR = LETTER_FS * 0.7;
    const grd = oct.createRadialGradient(lx, ly, 0, lx, ly, glowR);
    grd.addColorStop(0, `rgba(${ltr.r},${ltr.g},${ltr.b},0.22)`);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    oct.fillStyle = grd;
    oct.beginPath();
    oct.arc(lx, ly, glowR, 0, Math.PI * 2);
    oct.fill();

    // Small orbit trail dots
    for (let tr = 1; tr <= 5; tr++) {
      const ta = angle - tr * 0.12;
      const tx = CX + Math.cos(ta) * ORBIT_R;
      const ty = CY + Math.sin(ta) * ORBIT_R;
      oct.beginPath();
      oct.arc(tx, ty, 2 - tr * 0.28, 0, Math.PI * 2);
      oct.fillStyle = `rgba(${ltr.r},${ltr.g},${ltr.b},${(0.35 - tr * 0.06).toFixed(2)})`;
      oct.fill();
    }

    // Letter
    oct.font = `900 ${LETTER_FS}px "Segoe UI", "SF Pro Display", system-ui`;
    oct.textAlign    = 'center';
    oct.textBaseline = 'middle';

    // Outer glow layer
    oct.shadowColor = `rgb(${ltr.r},${ltr.g},${ltr.b})`;
    oct.shadowBlur  = 22;
    oct.fillStyle   = `rgba(${ltr.r},${ltr.g},${ltr.b},0.6)`;
    oct.fillText(ltr.char, lx, ly);

    // Crisp core layer
    oct.shadowBlur  = 8;
    oct.fillStyle   = `rgb(${ltr.r},${ltr.g},${ltr.b})`;
    oct.fillText(ltr.char, lx, ly);

    oct.shadowBlur  = 0;
    oct.shadowColor = 'transparent';
  });
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MAIN ANIMATION LOOP
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const DURATION  = 10000; // 10 seconds total
const startTime = performance.now();

function tick(ts) {
  const elapsed = ts - startTime;
  const t       = elapsed / 1000;

  drawStarfield(t);
  drawOrbitCanvas(t);

  // Progress bar
  const pct = Math.min(100, (elapsed / DURATION) * 100);
  document.getElementById('progressBar').style.width = pct + '%';

  if (elapsed < DURATION - 900) {
    requestAnimationFrame(tick);
  } else {
    // Fade out — main.js closes the window at the 10s mark
    document.body.classList.add('fade-out');
  }
}

requestAnimationFrame(tick);
</script>
</body>
</html>
