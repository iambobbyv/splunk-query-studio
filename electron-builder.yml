appId: com.souriapps.splunk-query-studio
productName: Splunk Query Studio

directories:
  buildResources: assets
  output: dist

# Files bundled into the app package
files:
  - main.js
  - preload.js
  - index.html
  - splash.html
  - package.json
  - renderer/**/*
  - assets/spl-knowledge.json

# Windows builds: NSIS installer + standalone portable
win:
  target:
    - target: nsis
      arch: x64
    - target: portable
      arch: x64
  icon: assets/icon.ico

# NSIS installer options
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Splunk Query Studio
  uninstallDisplayName: Splunk Query Studio
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
  deleteAppDataOnUninstall: false

# macOS builds: DMG (x64 + Apple Silicon) — built on macOS via GitHub Actions
# See .github/workflows/build-macos.yml
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  icon: assets/icon.icns
  category: public.app-category.developer-tools
  darkModeSupport: true
  identity: null   # unsigned; set CSC_* env vars for notarised distribution builds

dmg:
  backgroundColor: '#020617'
  window:
    width: 620
    height: 400

# App metadata
publish: null
