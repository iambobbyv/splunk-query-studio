name: Build macOS

# Runs automatically on every push to main, or manually via GitHub Actions UI.
# Produces: SplunkQueryStudio-x64.dmg, SplunkQueryStudio-arm64.dmg (Apple Silicon),
#           and matching .zip archives — all as downloadable artifacts.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    name: Electron — macOS (x64 + Apple Silicon)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Generate icon.ico (Windows) AND icon.icns (macOS) in one pass
      - name: Generate icons
        run: node assets/generate-icon.js

      # electron-builder --mac produces DMG + ZIP for x64 and arm64
      # CSC_IDENTITY_AUTO_DISCOVERY=false → skip code signing (unsigned builds)
      # To distribute on the Mac App Store or via Gatekeeper-notarised DMG, set:
      #   CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID, APPLE_ID_PASSWORD, APPLE_TEAM_ID
      #   as GitHub repository secrets and remove the env override below.
      - name: Build macOS packages
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SplunkQueryStudio-macOS-${{ github.sha }}
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 30
